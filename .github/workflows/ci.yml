name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  id-token: write
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      build-number: ${{ steps.build-number.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build number
        id: build-number
        run: echo "value=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy frontend to static resources
        run: |
          mkdir -p src/main/resources/static
          cp -r frontend/dist/* src/main/resources/static/

      - name: Run Maven verify
        run: mvn verify -B

      - name: Build Docker image
        run: docker build -t tempmon:${{ steps.build-number.outputs.value }} .

      - name: Save Docker image as artifact
        run: docker save tempmon:${{ steps.build-number.outputs.value }} | gzip > tempmon-${{ steps.build-number.outputs.value }}.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.build-number.outputs.value }}
          path: tempmon-${{ steps.build-number.outputs.value }}.tar.gz
          retention-days: 30

      - name: Configure AWS credentials
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Push image to ECR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          BUILD_NUMBER: ${{ steps.build-number.outputs.value }}
        run: |
          docker tag tempmon:${BUILD_NUMBER} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${BUILD_NUMBER}
          docker tag tempmon:${BUILD_NUMBER} ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${BUILD_NUMBER}
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

      - name: Summary
        run: echo "### Build \#${{ steps.build-number.outputs.value }} completed successfully :white_check_mark:" >> $GITHUB_STEP_SUMMARY
