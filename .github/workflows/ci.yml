name: Build & Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    outputs:
      build-number: ${{ steps.build-number.outputs.value }}
    steps:
      - uses: actions/checkout@v4

      - name: Generate build number
        id: build-number
        run: echo "value=${{ github.run_number }}" >> "$GITHUB_OUTPUT"

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Copy frontend to static resources
        run: |
          mkdir -p src/main/resources/static
          cp -r frontend/dist/* src/main/resources/static/

      - name: Run Maven verify
        run: mvn verify -B

      - name: Build Docker image
        run: docker build -t tempmon:${{ steps.build-number.outputs.value }} .

      - name: Save Docker image as artifact
        run: docker save tempmon:${{ steps.build-number.outputs.value }} | gzip > tempmon-${{ steps.build-number.outputs.value }}.tar.gz

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: docker-image-${{ steps.build-number.outputs.value }}
          path: tempmon-${{ steps.build-number.outputs.value }}.tar.gz
          retention-days: 30

      - name: Summary
        run: echo "### Build \#${{ steps.build-number.outputs.value }} completed successfully :white_check_mark:" >> $GITHUB_STEP_SUMMARY
