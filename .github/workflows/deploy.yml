name: Deploy

on:
  workflow_dispatch:
    inputs:
      build-number:
        description: 'Build number to deploy (from the Build & Test workflow)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read
  actions: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: docker-image-${{ inputs.build-number }}
          run-id: ${{ inputs.build-number }}
          github-token: ${{ secrets.GITHUB_TOKEN }}

      - name: Load Docker image
        run: gunzip -c tempmon-${{ inputs.build-number }}.tar.gz | docker load

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Tag and push image to ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          BUILD_NUMBER: ${{ inputs.build-number }}
        run: |
          docker tag tempmon:${BUILD_NUMBER} ${ECR_REGISTRY}/${ECR_REPOSITORY}:${BUILD_NUMBER}
          docker tag tempmon:${BUILD_NUMBER} ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:${BUILD_NUMBER}
          docker push ${ECR_REGISTRY}/${ECR_REPOSITORY}:latest

      - name: Deploy to ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ secrets.ECS_TASK_DEFINITION }}
          service: ${{ secrets.ECS_SERVICE }}
          cluster: ${{ secrets.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Summary
        run: echo "### Build \#${{ inputs.build-number }} deployed to production :rocket:" >> $GITHUB_STEP_SUMMARY
