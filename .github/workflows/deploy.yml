name: Deploy

on:
  workflow_dispatch:
    inputs:
      build-number:
        description: 'Build number to deploy (from the Build & Test workflow)'
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Verify image exists in ECR
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          BUILD_NUMBER: ${{ inputs.build-number }}
        run: |
          echo "Checking for image ${ECR_REGISTRY}/${ECR_REPOSITORY}:${BUILD_NUMBER}"
          aws ecr describe-images --repository-name ${ECR_REPOSITORY} --image-ids imageTag=${BUILD_NUMBER}

      - name: Update ECS task definition with new image
        id: task-def
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_REPOSITORY: ${{ secrets.ECR_REPOSITORY }}
          BUILD_NUMBER: ${{ inputs.build-number }}
          TASK_FAMILY: ${{ secrets.ECS_TASK_DEFINITION }}
        run: |
          # Get current task definition
          TASK_DEF=$(aws ecs describe-task-definition --task-definition ${TASK_FAMILY} --query taskDefinition)
          
          # Update the image tag
          NEW_IMAGE="${ECR_REGISTRY}/${ECR_REPOSITORY}:${BUILD_NUMBER}"
          NEW_TASK_DEF=$(echo $TASK_DEF | jq --arg IMAGE "$NEW_IMAGE" '.containerDefinitions[0].image = $IMAGE | del(.taskDefinitionArn, .revision, .status, .requiresAttributes, .compatibilities, .registeredAt, .registeredBy)')
          
          # Register new task definition
          NEW_ARN=$(aws ecs register-task-definition --cli-input-json "$NEW_TASK_DEF" --query taskDefinition.taskDefinitionArn --output text)
          echo "task-definition-arn=${NEW_ARN}" >> "$GITHUB_OUTPUT"
          echo "Registered new task definition: ${NEW_ARN}"

      - name: Deploy to ECS
        env:
          ECS_SERVICE: ${{ secrets.ECS_SERVICE }}
          ECS_CLUSTER: ${{ secrets.ECS_CLUSTER }}
        run: |
          aws ecs update-service \
            --cluster ${ECS_CLUSTER} \
            --service ${ECS_SERVICE} \
            --task-definition ${{ steps.task-def.outputs.task-definition-arn }} \
            --force-new-deployment
          
          echo "Waiting for service to stabilize..."
          aws ecs wait services-stable --cluster ${ECS_CLUSTER} --services ${ECS_SERVICE}

      - name: Summary
        run: echo "### Build \#${{ inputs.build-number }} deployed to production :rocket:" >> $GITHUB_STEP_SUMMARY
