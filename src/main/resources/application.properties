# -----------------------------------------------------------------------
# Hygrometer service configuration
# All values are read from environment variables with the defaults shown.
# DATABASE_URL and PORT are required — the application will exit(1) if absent.
# -----------------------------------------------------------------------

# DynamoDB endpoint override URL (required)
app.database-url=${DATABASE_URL:}

# HTTP listening port (required, 1-65535)
server.port=${PORT:0}

# Maximum accepted request body size in bytes (default 1 MB)
app.max-payload-bytes=${MAX_PAYLOAD_BYTES:1048576}

# Async request timeout in seconds (default 30, range 1-300)
app.request-timeout-seconds=${REQUEST_TIMEOUT_SECONDS:30}

# Configurable URL paths
app.ingest-path=${INGEST_PATH:/ingest}
app.readings-path=${READINGS_PATH:/readings}

# Spring MVC async timeout is set programmatically in AppConfig from
# app.request-timeout-seconds, so the property below is a placeholder
# that AppConfig will override at startup.
spring.mvc.async.request-timeout=-1
